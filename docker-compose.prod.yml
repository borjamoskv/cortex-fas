version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: cortex-fas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cortexfas
      POSTGRES_PASSWORD: cortexfas
      POSTGRES_DB: cortexfas
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortexfas"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cortex-fas-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cortexfas:cortexfas@db:5432/cortexfas
      STRIPE_KEY: ${STRIPE_KEY}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER}
      STRIPE_PRICE_PROFESSIONAL: ${STRIPE_PRICE_PROFESSIONAL}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      API_KEY_SECRET: ${API_KEY_SECRET}
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    volumes:
      - ./case_studies:/app/case_studies:ro
      - ./logs:/app/logs

volumes:
  pgdata:
    driver: local
